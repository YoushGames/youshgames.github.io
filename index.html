<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yoush Games</title>
<meta name="description" content="Yoush Games — handcrafted mobile games. Privacy policies for our titles.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{
    --paper:#efe7d6; --paper2:#e7dcc6; --card:#fbf6ea; --ink:#35302a;
    --ink-soft:#6a5f50; --line:#e0d4bd; --teal:#2f9e9b; --red:#e2503d; --orange:#f0772a;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; padding:48px 18px 64px; min-height:100vh;
    background:radial-gradient(120% 80% at 50% -10%, #f4eedf 0%, var(--paper) 55%, var(--paper2) 100%) fixed;
    color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  .wrap{max-width:640px;margin:0 auto;text-align:center}
  header{margin-bottom:34px}
  .brand{
    font-size:clamp(34px,9vw,52px);font-weight:800;letter-spacing:1px;margin:0;
    background:linear-gradient(95deg,var(--red),var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tag{color:var(--ink-soft);font-size:16px;margin:10px 0 0;letter-spacing:.2px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:24px;box-shadow:0 10px 30px rgba(80,60,30,.08);text-align:left;
  }
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft);margin:2px 0 16px}
  .game{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:16px 18px;border:1px solid var(--line);border-radius:14px;background:#fffdf7;
  }
  .game + .game{margin-top:12px}
  .g-name{font-weight:700;font-size:18px}
  .game a{
    color:var(--teal);text-decoration:none;font-weight:600;font-size:14.5px;white-space:nowrap;
    border-bottom:1px solid rgba(47,158,155,.4)
  }
  .game a:hover{border-bottom-color:var(--teal)}
  footer{margin-top:26px;color:var(--ink-soft);font-size:12.5px}
  footer a{color:var(--ink-soft)}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="brand">YOUSH&nbsp;GAMES</h1>
      <p class="tag">Handcrafted mobile games.</p>
    </header>

    <main class="card">
      <h2>Our games</h2>
      <div class="game">
        <span class="g-name">Paint Pool</span>
        <a href="paintpool/">Privacy policy &rarr;</a>
      </div>
    </main>

    <footer>&copy; 2026 Yoush Games &middot; <a href="mailto:youshgamestudio@gmail.com">youshgamestudio@gmail.com</a></footer>
  </div>
</body>
</html>
